<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');
:root{--g:#4caf50;--gdim:rgba(76,175,80,0.12);--y:#ffd600;--r:#e53935;--bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--bd:rgba(76,175,80,0.25);--tx:#e8e8e8;--mu:#777;--fd:'Bebas Neue',sans-serif;--fb:'IBM Plex Sans',sans-serif;--fm:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body,.root{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:16px;}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.hdr-logo{font-family:var(--fd);font-size:28px;color:var(--g);letter-spacing:2px;line-height:1;}
.hdr-logo span{color:var(--y);}
.hdr-meta{margin-left:auto;font-family:var(--fm);font-size:12px;color:var(--mu);text-align:right;line-height:1.6;}
.hdr-meta .handle{color:var(--g);font-size:14px;}
.drop-zone{margin:28px 20px;border:1.5px dashed var(--bd);border-radius:8px;padding:44px 20px;text-align:center;cursor:pointer;background:var(--s1);transition:border-color .2s,background .2s;}
.drop-zone:hover,.drag-over{border-color:var(--g)!important;background:var(--gdim)!important;}
.drop-zone i{font-size:36px;color:var(--g);margin-bottom:10px;display:block;}
.dz-title{font-family:var(--fd);font-size:22px;color:var(--g);letter-spacing:1px;margin-bottom:4px;}
.dz-sub{color:var(--mu);font-size:13px;}
.editor{display:none;}
.editor.active{display:block;}
.psbar{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:14px 20px;background:var(--s1);border-bottom:1px solid var(--bd);}
.psc{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:9px 11px;}
.psc-l{font-size:11px;color:var(--mu);font-family:var(--fm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.psc-v{font-family:var(--fd);font-size:22px;color:var(--g);}
.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 20px;background:var(--s1);gap:2px;}
.tab{font-family:var(--fd);font-size:16px;letter-spacing:1px;padding:12px 20px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--g);border-bottom-color:var(--g);}
.tc{display:none;padding:20px;}
.tc.active{display:block;}
.sec-title{font-family:var(--fd);font-size:19px;letter-spacing:1px;color:var(--g);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.btn-icon {width: 16px;height: 16px;pointer-events: none;}

/* ARTIFACTS */
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:11px;}
.art-card{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:16px 18px;display:flex;align-items:center;gap:14px;}
.art-card.owned{border-color:rgba(76,175,80,.4);}
.art-card.missing{border-color:rgba(255,214,0,.15);opacity:.75;}
.art-icon{width:46px;height:46px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--s2);}
.art-info{flex:1;min-width:0;}
.art-name{font-weight:500;font-size:15px;line-height:1.3;}
.art-desc{font-size:12px;color:var(--mu);margin-top:3px;line-height:1.4;}
.art-id{font-family:var(--fm);font-size:10px;color:#555;margin-top:3px;}
.art-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.lv-disp{font-family:var(--fm);font-size:13px;color:var(--g);min-width:38px;text-align:center;background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:4px 5px;}
.lv-btn{background:var(--s2);border:1px solid var(--bd);color:var(--tx);width:30px;height:30px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s;padding:0;}
.lv-btn:hover{background:var(--gdim);border-color:var(--g);}
.add-btn{background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.3);color:var(--y);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:13px;font-family:var(--fm);transition:background .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.add-btn:hover{background:rgba(255,214,0,.18);}

/* COINS */
.coin-summary{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.coin-card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:18px;}
.coin-title{font-family:var(--fd);font-size:18px;letter-spacing:1px;margin-bottom:14px;}
.coin-title.dreamer{color:#a78bfa;}
.coin-title.dragon{color:#fb923c;}
.coin-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-family:var(--fm);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.coin-row:last-child{border-bottom:none;}
.coin-row .lbl{color:var(--mu);}
.coin-row .val{color:var(--tx);}
.coin-available{margin-top:14px;display:flex;align-items:center;gap:10px;}
.coin-avail-label{font-family:var(--fm);font-size:12px;color:var(--mu);}
.coin-avail-input{font-family:var(--fd);font-size:26px;width:150px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:4px 10px;color:#a78bfa;}
.coin-avail-input.dragon{color:#fb923c;}
.coin-avail-input:focus{outline:none;border-color:var(--g);}

/* CHAR CARDS */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:10px;}
.char-card{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:14px;}
.char-name{font-family:var(--fd);font-size:16px;letter-spacing:1px;margin-bottom:10px;}
.char-stat{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.char-stat:last-child{border-bottom:none;}
.ck{color:var(--mu);}
.cvc{display:flex;align-items:center;gap:5px;}
.c-btn{background:var(--s2);border:1px solid var(--bd);color:var(--tx);width:26px;height:26px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:background .1s;font-size:16px;line-height:1;}
.c-btn:hover{background:var(--gdim);border-color:var(--g);}
.cv{font-family:var(--fm);font-size:13px;min-width:34px;text-align:center;}

/* COLLAPSIBLE SECTIONS */
.coll-section{margin-bottom:6px;border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
.coll-header{font-family:var(--fd);font-size:16px;letter-spacing:1px;padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--s2);user-select:none;}
.coll-header:hover{background:rgba(76,175,80,.08);}
.coll-arrow{font-size:12px;color:var(--mu);transition:transform .2s;}
.coll-header.open .coll-arrow{transform:rotate(180deg);}
.coll-body{display:none;padding:14px;}
.coll-body.open{display:block;}

/* BOSS UI */
.boss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;}
.boss-card{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:12px 14px;}
.boss-card-title{font-family:var(--fd);font-size:14px;letter-spacing:.5px;color:var(--mu);margin-bottom:10px;text-transform:uppercase;}
.boss-stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
.boss-stat-row:last-child{border-bottom:none;}
.bs-label{color:var(--mu);}
.bs-label.editable{color:var(--tx);}
.bs-val-wrap{display:flex;align-items:center;gap:5px;}
.bs-val{font-family:var(--fm);font-size:13px;min-width:34px;text-align:center;color:var(--g);}
.bs-val.computed{color:var(--mu);font-size:12px;}
.bs-btn{background:var(--s1);border:1px solid var(--bd);color:var(--tx);width:24px;height:24px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .1s;font-size:15px;line-height:1;}

.stat-search{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:5px;color:var(--tx);padding:9px 14px;font-family:var(--fm);font-size:14px;margin-bottom:14px;}
.stat-search:focus{outline:none;border-color:var(--g);}
.stat-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:8px;}
.stat-row{background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:11px 14px;display:flex;align-items:center;gap:10px;}
.stat-key{font-family:var(--fm);font-size:12px;color:var(--mu);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stat-label{color:var(--tx);font-size:14px;display:block;margin-bottom:2px;}
.stat-val{font-family:var(--fm);font-size:14px;color:var(--g);width:90px;text-align:right;background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:5px 9px;}
.adv-toggle{font-family:var(--fm);font-size:12px;color:var(--mu);cursor:pointer;border:1px solid var(--bd);background:var(--s2);padding:5px 12px;border-radius:4px;margin-bottom:14px;}
.adv-toggle:hover{color:var(--tx);}
.adv-section{display:none;}
.adv-section.show{display:block;}

.save-bar{position:sticky;bottom:0;background:var(--s1);border-top:1px solid var(--bd);padding:13px 20px;display:flex;align-items:center;gap:12px;}
.save-btn{background:var(--g);border:none;color:#000;padding:11px 24px;border-radius:5px;cursor:pointer;font-family:var(--fd);font-size:19px;letter-spacing:1px;transition:background .15s,transform .1s;}
.save-btn:hover{background:#66bb6a;}
.save-btn:active{transform:scale(.97);}
.save-btn:disabled{background:#2a2a2a;color:#555;cursor:not-allowed;}
.status{font-family:var(--fm);font-size:13px;color:var(--mu);}
.status.ok{color:var(--g);}
.status.err{color:var(--r);}

function artMaxLevel(sym){ return (ARTIFACTS[sym]||[null,6])[1]; }
function artDesc(sym, lv){
  const a=ARTIFACTS[sym]; if(!a) return '';
  const descs=a[2]; if(!descs||!descs.length) return '';
  return descs[Math.min(lv-1, descs.length-1)];
}

// Sync artifact changes to all coop slots that have inventory data
function coopInvs(){
  return (save.state.coop||[])
    .map(c=>c&&c.lifetime&&c.lifetime.artifact_inventory)
    .filter(inv=>inv&&inv.artifact_symbols&&inv.artifact_symbols.length>0);
}
function coopAddArtifact(symInt, lv){
  coopInvs().forEach(inv=>{
    if(!inv.artifact_symbols.includes(symInt)){
      inv.artifact_symbols.push(symInt);
      inv.artifact_levels.push(lv);
    }
  });
}
function coopRemoveArtifact(symInt){
  coopInvs().forEach(inv=>{
    const idx=inv.artifact_symbols.indexOf(symInt);
    if(idx!==-1){inv.artifact_symbols.splice(idx,1);inv.artifact_levels.splice(idx,1);}
  });
}
function coopSetLevel(symInt, lv){
  coopInvs().forEach(inv=>{
    const idx=inv.artifact_symbols.indexOf(symInt);
    if(idx!==-1) inv.artifact_levels[idx]=lv;
  });
}

function loadFile(file){
  origName=file.name;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const buf=new Uint8Array(e.target.result);
      const zOff=findZlib(buf);if(zOff===-1)throw new Error('No zlib stream found');
      const dec=pako.inflate(buf.slice(zOff));
      const js=new TextDecoder().decode(dec).replace(/\0+$/,'');
      save=JSON.parse(js);rawBuf=buf;zlibOff=zOff;dirty=false;
      // Build set of JSON paths whose values were floats (X.0) in the original
      origFloatPaths=new Set();
      buildFloatPaths(JSON.parse(js),'',origFloatPaths,js);
      render();setStatus('loaded: '+file.name,'ok');
    }catch(err){setStatus('error: '+err.message,'err');}
  };
  r.readAsArrayBuffer(file);
}

// Build a parallel structure from raw JSON that marks which numbers were floats.
// We walk the raw JSON string character by character alongside JSON.parse output.
function buildFloatPaths(obj,path,floatSet,rawJson){
  let pos=0;
  function skipWs(){while(pos<rawJson.length&&' \t\n\r'.includes(rawJson[pos]))pos++;}
  function parseValue(o,p){
    skipWs();
    const c=rawJson[pos];
    if(c==='"'){parseString();return;}
    if(c==='{'){parseObject(o,p);return;}
    if(c==='['){parseArray(o,p);return;}
    if(c==='t'){pos+=4;return;} // true
    if(c==='f'){pos+=5;return;} // false
    if(c==='n'){pos+=4;return;} // null
    // number
    const start=pos;
    if(rawJson[pos]==='-')pos++;
    while(pos<rawJson.length&&'0123456789'.includes(rawJson[pos]))pos++;
    let isFloat=false;
    if(pos<rawJson.length&&rawJson[pos]==='.'){isFloat=true;pos++;while(pos<rawJson.length&&'0123456789'.includes(rawJson[pos]))pos++;}
    if(pos<rawJson.length&&'eE'.includes(rawJson[pos])){isFloat=true;pos++;if('+-'.includes(rawJson[pos]))pos++;while(pos<rawJson.length&&'0123456789'.includes(rawJson[pos]))pos++;}
    if(isFloat&&p!=='')floatSet.add(p);
  }
  function parseString(){
    pos++; // opening "
    while(pos<rawJson.length){if(rawJson[pos]==='\\'){pos+=2;}else if(rawJson[pos]==='"'){pos++;return;}else pos++;}
  }
  function parseObject(o,p){
    pos++; // {
    skipWs();
    if(rawJson[pos]==='}'){pos++;return;}
    while(pos<rawJson.length){
      skipWs();
      const kstart=pos;
      parseString();
      const key=rawJson.slice(kstart+1,pos-1).replace(/\\(.)/g,'$1');
      skipWs();pos++; // :
      const cp=p?p+'.'+key:key;
      parseValue(o&&typeof o==='object'?o[key]:undefined,cp);
      skipWs();
      if(rawJson[pos]==='}'){pos++;return;}
      pos++; // ,
    }
  }
  function parseArray(o,p){
    pos++; // [
    skipWs();
    if(rawJson[pos]===']'){pos++;return;}
    let i=0;
    while(pos<rawJson.length){
      parseValue(Array.isArray(o)?o[i]:undefined,p+'['+i+']');
      i++;skipWs();
      if(rawJson[pos]===']'){pos++;return;}
      pos++; // ,
    }
  }
  parseValue(obj,'');
}

// Custom stringify that restores .0 on whole-number floats that were originally floats
function floatSafeStringify(obj,path){
  if(obj===null)return'null';
  if(typeof obj==='boolean')return obj?'true':'false';
  if(typeof obj==='string')return JSON.stringify(obj);
  if(typeof obj==='number'){
    if(Number.isInteger(obj)&&origFloatPaths&&origFloatPaths.has(path))return obj+'.0';
    return String(obj);
  }
  if(Array.isArray(obj)){
    return'['+obj.map((v,i)=>floatSafeStringify(v,path+'['+i+']')).join(',')+']';
  }
  if(typeof obj==='object'){
    const parts=[];
    for(const k of Object.keys(obj)){
      const p=path?path+'.'+k:k;
      parts.push(JSON.stringify(k)+':'+floatSafeStringify(obj[k],p));
    }
    return'{'+parts.join(',')+'}';
  }
  return String(obj);
}

function repack(){
  const js=floatSafeStringify(save,'')+'\0';
  const jb=new TextEncoder().encode(js);
  const comp=pako.deflate(jb,{level:6});
  const hdr=rawBuf.slice(0,zlibOff);
  // Compute MD5 over the actual bytes that get compressed (same as what game will decompress)
  const m=new TextEncoder().encode(md5bytes(jb));
  for(let i=0;i<32;i++)hdr[8+i]=m[i];
  const us=wLE(jb.length),cs=wLE(comp.length);
  for(let i=0;i<4;i++){hdr[41+i]=us[i];hdr[45+i]=cs[i];}
  const out=new Uint8Array(hdr.length+comp.length);
  out.set(hdr);out.set(comp,hdr.length);return out;
}

function exportSave(){
  try{
    const out=repack();
    const blob=new Blob([out],{type:'application/octet-stream'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=origName;a.click();
    dirty=false;setStatus('exported -- drop into your TMNTSF folder','ok');
  }catch(err){setStatus('export error: '+err.message,'err');}
}

function renderGlobalStats(){
  const st=save.state.lifetime.stats;
  const filter=(document.getElementById('ss')||{}).value?.toLowerCase()||'';
  const HIDE=new Set([...ADV_KEYS,...CHAR_STAT_KEYS,...BOSS_SECTIONS_KEYS]);

  const container=document.getElementById('stat-sections');
  const bossEl=document.getElementById('boss-sections');
  container.innerHTML='';
  if(bossEl)container.appendChild(bossEl);

  STAT_SECTIONS.forEach(section=>{
    const rows=section.keys.filter(([k,l])=>{
      if(HIDE.has(k))return false;
      if(!filter)return true;
      return k.includes(filter)||l.toLowerCase().includes(filter);
    });
    if(!rows.length)return;
    const sec=collapsible(section.title,'var(--mu)',body=>{
      const list=document.createElement('div');list.className='stat-list';body.appendChild(list);
      rows.forEach(([k,l])=>{
        const val=st[k]&&st[k].value!==undefined?Math.round(st[k].value):0;
        const row=document.createElement('div');row.className='stat-row';
        row.innerHTML=`<div class="stat-key"><span class="stat-label">${l}</span>${k}</div><input class="stat-val" type="number" value="${val}" data-key="${k}" step="1" min="0">`;
        list.appendChild(row);
        row.querySelector('input').addEventListener('change',e=>{
          const nv=parseFloat(e.target.value);if(isNaN(nv))return;
          setStat(k,nv);markDirty();
        });
      });
    });
    container.appendChild(sec);
  });

  const advKeys=Object.keys(st).filter(k=>ADV_KEYS.has(k));
  const advList=document.getElementById('adv-list');advList.innerHTML='';
  advKeys.forEach(k=>{
    const val=st[k]&&st[k].value!==undefined?Math.round(st[k].value):0;
    const row=document.createElement('div');row.className='stat-row';
    row.innerHTML=`<div class="stat-key"><span class="stat-label">${k.replace(/_/g,' ')}</span>${k}</div><input class="stat-val" type="number" value="${val}" data-key="${k}" step="1" min="0">`;
    advList.appendChild(row);
    row.querySelector('input').addEventListener('change',e=>{
      const nv=parseFloat(e.target.value);if(isNaN(nv))return;setStat(k,nv);markDirty();
    });
  });
}

document.getElementById('art-grid').addEventListener('click',e=>{
  if(!save)return;
  const add=e.target.closest('[data-action="add"]');
  const lb=e.target.closest('.lv-btn');
  const inv=save.state.lifetime.artifact_inventory;
  if(add){
    const sym=add.dataset.s;
    const symInt=parseInt(sym);
    inv.artifact_symbols.push(symInt);
    inv.artifact_levels.push(1);
    coopAddArtifact(symInt,1);
    markDirty();render();
  }
  if(lb){
    const sym=lb.dataset.s,dir=parseInt(lb.dataset.d);
    const symInt=parseInt(sym);
    const idx=inv.artifact_symbols.indexOf(symInt);
    if(idx!==-1){
      const newLv=inv.artifact_levels[idx]+dir;
      if(newLv<1){
        inv.artifact_symbols.splice(idx,1);inv.artifact_levels.splice(idx,1);
        coopRemoveArtifact(symInt);
        markDirty();render();return;
      }
      const lv=Math.min(artMaxLevel(sym),newLv);
      inv.artifact_levels[idx]=lv;
      coopSetLevel(symInt,lv);
      const lvEl=document.getElementById('lv'+sym);if(lvEl)lvEl.textContent='Lv '+lv;
      const descEl=document.getElementById('desc'+sym);if(descEl)descEl.textContent=artDesc(sym,lv);
      markDirty();
    }
  }
});

document.getElementById('char-grid').addEventListener('click',e=>{
  if(!save)return;
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const {char,uid,action}=btn.dataset;
  const delta=action==='inc'?1:-1;
  const c=CHARS.find(x=>x.name===char);if(!c)return;
  const st=save.state.lifetime.stats;
  if(uid==='__deaths__'){
    const arr=st.deaths?st.deaths.values:[];
    const found=arr.find(x=>x.key===c.id);
    const cur=found?found.value:0;const nv=Math.max(0,cur+delta);
    if(found)found.value=nv;else arr.push({key:c.id,value:nv});
    const el=document.getElementById(`cv-${char}-${uid}`);if(el)el.textContent=Math.round(nv);
  } else if(uid==='__victories__'){
    const arr=st.victories?st.victories.values:[];
    const found=arr.find(x=>x.key===c.id);
    const cur=found?found.value:0;const nv=Math.max(0,cur+delta);
    if(found)found.value=nv;else arr.push({key:c.id,value:nv});
    const el=document.getElementById(`cv-${char}-${uid}`);if(el)el.textContent=Math.round(nv);
  } else {
    const cur=sv(uid);const nv=Math.max(0,cur+delta);
    setStat(uid,nv);
    const el=document.getElementById(`cv-${char}-${uid}`);if(el)el.textContent=nv;
  }
  markDirty();
});

})();
</script>
